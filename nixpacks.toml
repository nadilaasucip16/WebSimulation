[phases.setup]
nixPkgs = [
    "php84",
    "php84Extensions.pdo",
    "php84Extensions.pdo_sqlite",
    "php84Extensions.mbstring",
    "php84Extensions.xml",
    "php84Extensions.curl",
    "php84Extensions.tokenizer",
    "php84Extensions.fileinfo",
    "php84Extensions.gd",
    "php84Extensions.bcmath",
    "php84Extensions.ctype",
    "php84Extensions.openssl",
    "php84Extensions.zip",
    "composer",
    "nodejs_20",
    "nodePackages.npm"
]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci"
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force --seed && php artisan storage:link 2>/dev/null || true && php artisan serve --host 0.0.0.0 --port $PORT"
