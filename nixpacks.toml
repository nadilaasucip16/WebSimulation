[phases.setup]
nixPkgs = [
    "php83",
    "php83Extensions.pdo",
    "php83Extensions.pdo_mysql",
    "php83Extensions.mbstring",
    "php83Extensions.xml",
    "php83Extensions.curl",
    "php83Extensions.tokenizer",
    "php83Extensions.fileinfo",
    "php83Extensions.gd",
    "php83Extensions.bcmath",
    "php83Extensions.ctype",
    "php83Extensions.openssl",
    "php83Extensions.zip",
    "composer",
    "nodejs_20",
    "nodePackages.npm"
]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci"
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force --seed && php artisan storage:link 2>/dev/null || true && php artisan serve --host 0.0.0.0 --port $PORT"
