[variables]
NIXPACKS_PHP_VERSION = "8.4"

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci"
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force --seed && php artisan storage:link 2>/dev/null || true && php artisan serve --host 0.0.0.0 --port $PORT"
